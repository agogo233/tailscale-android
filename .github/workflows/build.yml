name: Android DIY

on:
  workflow_dispatch:
    inputs:
      record:
        description: "ControlURL"
        required: false
        default: ""
        type: string


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # - name: Check out code
      #   uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/checkout@v4

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version-file: "go.mod"
      - name: Switch to Java 17 # Note: 17 is pre-installed on ubuntu-latest
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: "temurin"
          java-version: "17"

      # Clean should essentially be a no-op, but make sure that it works.
      - name: Clean
        run: make clean

      - name: Resolve ControlURL
        run: |
          URL="${{ inputs.record || secrets.CONTROL_URL }}"
          if [ -z "$URL" ]; then
            echo "❌ ControlURL 未设置。请在 workflow_dispatch 输入框中填写，或设置仓库 Secrets.CONTROL_URL"
            exit 1
          fi
          echo "ControlURL=$URL" >> $GITHUB_ENV

      - name: Replace ControlURL
        run: |
          sed -i 's|<server_Address>|'"${{ env.ControlURL }}"'|g' android/src/main/java/com/tailscale/ipn/ui/model/Ipn.kt
      - name: Build APKs
        run: make apk-arm64-v8a

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailscale
          path: tailscale-debug-arm64-v8a.apk
          archive-options: --password ${{ secrets.ARTIFACT_PASSWORD }}