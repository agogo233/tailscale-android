name: Android CI

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - all

jobs:
  build:
    if: inputs.build_type == 'debug' || inputs.build_type == 'all'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Clean
        run: make clean

      - name: Format check (ktfmt)
        run: make fmt-check

      - name: Run Go tests
        run: make go-test

      - name: Build APKs
        run: make tailscale-debug.apk

      - name: Run tests
        run: make test

      - name: Package debug APK (encrypted)
        run: |
          mkdir -p artifacts
          zip -j -P "${{ secrets.ARTIFACT_PASSWORD }}" artifacts/tailscale-debug.zip tailscale-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-debug
          path: artifacts/tailscale-debug.zip

  release-arm64:
    if: inputs.build_type == 'release' || inputs.build_type == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version-file: "go.mod"
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Check signing secrets
        run: |
          for var in JKS_BASE64 SIGN_STORE_PASSWORD SIGN_KEY_ALIAS ARTIFACT_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              exit 1
            fi
          done
        env:
          JKS_BASE64: ${{ secrets.JKS_BASE64 }}
          SIGN_STORE_PASSWORD: ${{ secrets.SIGN_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          ARTIFACT_PASSWORD: ${{ secrets.ARTIFACT_PASSWORD }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.JKS_BASE64 }}" | base64 -d > /tmp/release.jks
          chmod 600 /tmp/release.jks

      - name: Build signed arm64-v8a release APK
        run: make release-apk-arm64-v8a
        env:
          SIGN_STORE_FILE: /tmp/release.jks
          SIGN_STORE_PASSWORD: ${{ secrets.SIGN_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}

      - name: Package release APK (encrypted)
        run: |
          mkdir -p artifacts
          zip -j -P "${{ secrets.ARTIFACT_PASSWORD }}" artifacts/tailscale-release-arm64-v8a.zip tailscale-release-arm64-v8a.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-release-arm64-v8a
          path: artifacts/tailscale-release-arm64-v8a.zip